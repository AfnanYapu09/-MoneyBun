name: Release APK

# Builds a release APK and publishes it to a GitHub Release tagged `latest`,
# so it can be downloaded and installed straight from an Android phone
# (Releases page → app-release.apk → install). No Flutter/Android SDK needed
# on the phone. The release is updated on every push to main.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to create/update the release and upload the APK asset.
permissions:
  contents: write

concurrency:
  group: release-apk
  cancel-in-progress: true

jobs:
  build:
    name: Build & publish release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.2
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Generate code (Drift)
        run: dart run build_runner build

      # Release build, signed with the debug key (default gradle config) and
      # without minify, so the ML Kit OCR models stay intact for sideloading.
      - name: Build release APK
        run: flutter build apk --release

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: MoneyBun (latest)
          prerelease: true
          fail_on_unmatched_files: true
          body: |
            MoneyBun test build — install on Android to try slip album scanning.

            Download `app-release.apk` below, open it on your phone, allow
            "install from unknown sources", then install. This build is signed
            with a debug key and is for testing only.
          files: build/app/outputs/flutter-apk/app-release.apk
