name: moneybun
description: "MoneyBun — แอปจดรายรับรายจ่ายด้วยสลิป/QR ของไทย (Thai income/expense tracker)."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.0.0

  # Local-first database (source of truth)
  drift: ^2.20.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.9.0

  # Navigation
  go_router: ^14.0.0

  # Slip reading
  image_picker: ^1.1.0
  mobile_scanner: ^7.0.0
  google_mlkit_text_recognition: ^0.15.0

  # Firebase (sync + auth + functions). Real config supplied by `flutterfire configure`.
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  cloud_functions: ^5.1.0
  google_sign_in: ^7.0.0

  # Utilities
  connectivity_plus: ^6.0.0
  uuid: ^4.4.0
  intl: any
  google_fonts: ^6.2.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.0
  drift_dev: ^2.20.0

flutter:
  uses-material-design: true
  generate: true
  # The "Bun" mascot and category icons are rendered programmatically
  # (CustomPainter + Material icons) so no binary assets are required yet.
  # Drop final pixel-art PNGs into assets/images/bun/ and declare them here later.
  assets:
    - google_fonts/
