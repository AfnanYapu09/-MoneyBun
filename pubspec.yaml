name: moneybun
description: "MoneyBun — แอปจดรายรับรายจ่ายด้วยสลิป/QR ของไทย (Thai income/expense tracker)."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.0.0

  # Local-first database (source of truth)
  drift: ^2.20.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.9.0

  # Navigation
  go_router: ^14.0.0

  # Slip reading (fully on-device)
  mobile_scanner: ^7.0.0
  google_mlkit_text_recognition: ^0.15.0 # Latin OCR: amounts, dates, refs
  # Thai OCR: sender/receiver names & bank labels. Vendored (see plugins/) with a
  # modernised android/build.gradle so it builds under AGP 9 / Gradle 9.
  flutter_tesseract_ocr:
    path: plugins/flutter_tesseract_ocr
  image: ^4.0.0 # pre-process slip images before Thai OCR (grayscale/contrast)
  photo_manager: ^3.0.0 # Android: read slips straight from a gallery album

  # Firebase (sync + auth). Real config supplied by `flutterfire configure`.
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  google_sign_in: ^7.0.0

  # Utilities
  connectivity_plus: ^6.0.0
  uuid: ^4.4.0
  intl: any
  google_fonts: ^6.2.0
  collection: ^1.18.0
  lucide_icons_flutter: ^3.1.14+2
  local_auth: ^3.0.1
  sign_in_with_apple: ^8.1.0
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.0
  drift_dev: ^2.20.0

flutter:
  uses-material-design: true
  generate: true
  # The "Bun" mascot and category icons are rendered programmatically
  # (CustomPainter + Material icons) so no binary assets are required yet.
  # Drop final pixel-art PNGs into assets/images/bun/ and declare them here later.
  assets:
    - google_fonts/
    # Tesseract Thai model + config (bundled for fully offline slip OCR).
    - assets/
    - assets/tessdata/
