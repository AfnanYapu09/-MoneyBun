name: flutter_tesseract_ocr
description: >-
  Vendored, Android-only build of flutter_tesseract_ocr (upstream 0.4.31) with a
  modernised android/build.gradle so it builds under this project's AGP 9 /
  Gradle 9 toolchain. Provides on-device Tesseract (Thai) OCR for slip reading.
version: 0.4.31
homepage: https://github.com/khjde1207/tesseract_ocr
publish_to: "none"

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=1.12.0"

dependencies:
  flutter:
    sdk: flutter
  path_provider: ^2.1.4
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: io.paratoner.flutter_tesseract_ocr
        pluginClass: FlutterTesseractOcrPlugin
